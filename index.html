<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lista de Ramais — Tecfag Group &amp; Valem</title>

<style>
/* ==================== WINDOWS 2000 SYSTEM STYLES ==================== */

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --win-bg:       #d4d0c8;
  --win-dark:     #808080;
  --win-darker:   #404040;
  --win-light:    #ffffff;
  --win-black:    #000000;
  --win-text:     #000000;
  --win-surface:  #d4d0c8;
  --win-sunken:   #ffffff;
  --title-start:  #0a246a;
  --title-end:    #a6c9ff;
  --title-text:   #ffffff;
  --active-item:  #0a246a;
  --active-text:  #ffffff;
  --red:          #c00000;
  --blue:         #0000c0;
}

body {
  font-family: 'Tahoma', 'Noto Sans', sans-serif;
  font-size: 11px;
  background: var(--win-bg);
  color: var(--win-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- BEVELED BORDER HELPERS ---- */
.raised {
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
}
.raised-sm {
  border: 1px solid;
  border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light);
}
.sunken {
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
}
.sunken-sm {
  border: 1px solid;
  border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
}

/* ---- TITLE BAR ---- */
.titlebar {
  background: linear-gradient(to right, var(--title-start), var(--title-end));
  color: var(--title-text);
  font-weight: 700;
  font-size: 12px;
  padding: 3px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
.titlebar-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.titlebar-icon {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.win-btn {
  width: 16px;
  height: 14px;
  background: var(--win-surface);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  color: var(--win-black);
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
}
.win-btn:hover { background: #c0c0c0; }
.win-btn:active {
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
}
.titlebar-btns { display: flex; gap: 2px; }

/* ---- MENU BAR ---- */
.menubar {
  background: var(--win-surface);
  padding: 2px 4px;
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--win-dark);
}
.menu-item {
  padding: 2px 8px;
  cursor: pointer;
  font-size: 11px;
  text-decoration: underline;
  text-underline-offset: 1px;
}
.menu-item:hover, .menu-item:focus {
  background: var(--active-item);
  color: var(--active-text);
}

/* ---- TOOLBAR ---- */
.toolbar {
  background: var(--win-surface);
  padding: 3px 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--win-dark);
  flex-wrap: wrap;
}
.toolbar-btn {
  padding: 3px 10px;
  background: var(--win-surface);
  font-family: 'Tahoma', sans-serif;
  font-size: 11px;
  cursor: pointer;
  color: var(--win-black);
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
  white-space: nowrap;
}
.toolbar-btn:hover { background: #e4e0d8; }
.toolbar-btn:active, .toolbar-btn.active {
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  background: #c8c4bc;
}
.toolbar-sep {
  width: 1px;
  height: 20px;
  background: var(--win-dark);
  margin: 0 3px;
  flex-shrink: 0;
}
.toolbar-label {
  font-size: 11px;
  margin-right: 2px;
  white-space: nowrap;
}
.toolbar-input {
  padding: 2px 4px;
  font-family: 'Tahoma', sans-serif;
  font-size: 11px;
  background: var(--win-sunken);
  color: var(--win-black);
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  outline: none;
  flex: 1;
  min-width: 160px;
  max-width: 280px;
}
.toolbar-select {
  padding: 2px 4px;
  font-family: 'Tahoma', sans-serif;
  font-size: 11px;
  background: var(--win-sunken);
  color: var(--win-black);
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  outline: none;
  cursor: pointer;
}

/* ---- ADDRESS BAR ---- */
.addressbar {
  background: var(--win-surface);
  padding: 3px 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--win-dark);
}
.addr-label { font-size: 11px; font-weight: 700; }
.addr-input {
  flex: 1;
  padding: 1px 4px;
  font-family: 'Tahoma', sans-serif;
  font-size: 11px;
  background: var(--win-sunken);
  color: var(--win-black);
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  outline: none;
  max-width: 500px;
}
.live-led {
  display: inline-block;
  width: 8px; height: 8px;
  background: #00c000;
  border-radius: 50%;
  border: 1px solid #007000;
  animation: blink 2s infinite;
  margin-right: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ---- MAIN AREA ---- */
.main-window {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  background: var(--win-bg);
}

/* ---- DEPT BLOCK ---- */
.dept-block {
  margin-bottom: 10px;
}
.dept-header {
  background: linear-gradient(to right, var(--title-start), var(--title-end));
  color: var(--title-text);
  font-weight: 700;
  font-size: 11px;
  padding: 3px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0;
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
}
.dept-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  background: rgba(255,255,255,0.3);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.5);
}
.dept-count {
  font-size: 10px;
  opacity: 0.85;
  margin-left: auto;
}

/* ---- CARD GRID ---- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 4px;
  padding: 4px;
  background: var(--win-bg);
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  border-top: none;
}

/* ---- CARD ---- */
.card {
  background: var(--win-surface);
  padding: 6px 8px;
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
  cursor: default;
}
.card:hover {
  background: #c8c4bc;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
}
.card:active {
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
}
.card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--win-dark);
}
.avatar {
  width: 32px;
  height: 32px;
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  color: white;
  flex-shrink: 0;
}
.card-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--win-black);
  line-height: 1.3;
}
.card-email {
  font-size: 10px;
  color: #0000c0;
  text-decoration: underline;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 130px;
}
.ramal-area {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--win-sunken);
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  padding: 3px 6px;
}
.ramal-label {
  font-size: 10px;
  color: var(--win-darker);
  font-weight: 700;
  text-transform: uppercase;
  white-space: nowrap;
}
.ramal-display {
  font-family: 'Courier New', monospace;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--win-black);
}

/* ---- STATUS BAR ---- */
.statusbar {
  background: var(--win-surface);
  border-top: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  padding: 2px 8px;
  display: flex;
  align-items: center;
  gap: 0;
  font-size: 11px;
}
.status-panel {
  padding: 1px 8px;
  border: 1px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  margin-right: 4px;
  white-space: nowrap;
}
.status-panel:last-child { margin-left: auto; }

/* ---- EMPTY / LOADING ---- */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--win-darker);
  font-size: 11px;
}
.loading-bar {
  width: 200px;
  height: 16px;
  background: var(--win-sunken);
  border: 2px solid;
  border-color: var(--win-darker) var(--win-light) var(--win-light) var(--win-darker);
  margin: 8px auto 0;
  overflow: hidden;
}
.loading-fill {
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    var(--active-item) 0px,
    var(--active-item) 10px,
    #a6c9ff 10px,
    #a6c9ff 16px
  );
  animation: loading 1.2s linear infinite;
}
@keyframes loading { from{transform:translateX(-16px)} to{transform:translateX(0)} }

/* ---- SCROLLBAR (IE-style) ---- */
::-webkit-scrollbar { width: 16px; height: 16px; }
::-webkit-scrollbar-track { background: var(--win-bg); }
::-webkit-scrollbar-thumb {
  background: var(--win-surface);
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
}
::-webkit-scrollbar-button {
  background: var(--win-surface);
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
  height: 16px;
  width: 16px;
}

/* ---- TAG COLORS ---- */
.tag-t { background: rgba(192,0,0,0.15); color: var(--red); border: 1px solid var(--red); }
.tag-v { background: rgba(0,0,192,0.12); color: var(--blue); border: 1px solid var(--blue); }
.tag-o { background: rgba(128,0,0,0.1); color: #800000; border: 1px solid #800000; }

/* window outer frame */
.window-frame {
  flex: 1;
  display: flex;
  flex-direction: column;
  border: 2px solid;
  border-color: var(--win-light) var(--win-darker) var(--win-darker) var(--win-light);
  background: var(--win-surface);
  overflow: hidden;
}

html, body { height: 100%; }
</style>
</head>
<body>

<div class="window-frame">

  <!-- TITLE BAR -->
  <div class="titlebar">
    <div class="titlebar-left">
      <!-- IE-style globe icon (SVG) -->
      <div class="titlebar-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="6" fill="#1a5fb4" stroke="#6ab0f5" stroke-width="0.5"/>
          <ellipse cx="7" cy="7" rx="2.5" ry="6" fill="none" stroke="#6ab0f5" stroke-width="0.5"/>
          <line x1="1" y1="7" x2="13" y2="7" stroke="#6ab0f5" stroke-width="0.5"/>
          <line x1="2" y1="4" x2="12" y2="4" stroke="#6ab0f5" stroke-width="0.5"/>

        </svg>
      </div>
      Lista de Ramais — Tecfag Group &amp; Valem

    <div class="titlebar-btns">

      <button class="win-btn" title="Maximizar">□</button>

    </div>
  </div>

  <!-- MENU BAR -->
  <div class="menubar">
    <span class="menu-item" tabindex="0">Arquivo</span>
    <span class="menu-item" tabindex="0">Editar</span>
    <span class="menu-item" tabindex="0">Exibir</span>
    <span class="menu-item" tabindex="0">Favoritos</span>
    <span class="menu-item" tabindex="0">Ferramentas</span>
    <span class="menu-item" tabindex="0">Ajuda</span>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="toolbar-btn" title="Voltar">◄ Voltar</button>
    <button class="toolbar-btn" title="Avançar">Avançar ►</button>
    <button class="toolbar-btn" onclick="location.reload()">↺ Atualizar</button>
    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Empresa:</span>
    <button class="toolbar-btn active" id="btnAll" onclick="setEmp(this,'')">Todos</button>
    <button class="toolbar-btn" id="btnT" onclick="setEmp(this,'TECFAG')">Tecfag</button>
    <button class="toolbar-btn" id="btnV" onclick="setEmp(this,'VALEM')">Valem</button>
    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Depto:</span>
    <select class="toolbar-select" id="filterDept" onchange="render()">
      <option value="">— Todos —</option>
    </select>
    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Buscar:</span>
    <input class="toolbar-input" type="text" id="searchInput" placeholder="Nome, ramal ou e-mail..." oninput="render()"/>
  </div>

  <!-- ADDRESS BAR -->
  <div class="addressbar">
    <span class="addr-label">Endereço:</span>
    <input class="addr-input" type="text" readonly value="intranet://tecfag-group/ramais/consulta"/>

    <span style="font-size:11px; color: #007000; font-weight:700;">Ao vivo</span>
  </div>

  <!-- STATS BAR -->
  <div class="toolbar" style="background:#e8e4dc; border-bottom:1px solid #808080; gap:16px; padding: 2px 8px;">

  </div>

  <!-- CONTENT -->
  <div class="content-area" id="content">

      <div>Carregando ramais...</div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="status-panel" id="statusLeft">Pronto</div>
    <div class="status-panel">Diretório Interno • Somente Consulta</div>
    <div class="status-panel">Tecfag Group &amp; Valem</div>

  </div>

</div><!-- /window-frame -->

<script>
/* ======================================================
      CORES — GARANTIR QUE NUNCA SE REPITAM
====================================================== */

const CORES_USADAS = {};

const CORES_DISPONIVEIS = [
  "#ef4444","#f97316","#f59e0b","#eab308","#84cc16","#22c55e","#10b981",
  "#14b8a6","#06b6d4","#0ea5e9","#3b82f6","#6366f1","#8b5cf6","#d946ef",
  "#ec4899","#f43f5e","#ff7f50","#ff8c00","#ffd700","#9acd32","#32cd32",
  "#00ced1","#1e90ff","#4169e1","#8a2be2","#9932cc","#ba55d3","#ff1493",
  "#ff69b4","#db7093","#ff4500","#ff6347","#ffa500","#adff2f","#7fff00",
  "#40e0d0","#6495ed","#00bfff","#00a6ff"
];

function getDeptColor(dept){
  const d = dept.toLowerCase();
  if(d==="marketing"){ CORES_USADAS[dept]="#a855f7"; return "#a855f7"; }
  if(CORES_USADAS[dept]) return CORES_USADAS[dept];
  const usadas = new Set(Object.values(CORES_USADAS));
  let livre = CORES_DISPONIVEIS.find(c => !usadas.has(c));
  if(!livre){
    do { livre = "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'); }
    while(usadas.has(livre));
  }
  CORES_USADAS[dept] = livre;
  return livre;
}

/* ======================================================
                    BUSCAR PLANILHA
====================================================== */

async function carregarRamais(){
  try {
    const base = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZEbyJ-ZwmXHsuP05HOhPAXbLLu5Utjr36e60r22PG-VLBSJb2JCsEF9-beUZfHAKKQRQkJzpGX34R/pub?output=csv";
    const url  = base + "&_=" + Date.now();
    const res  = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error("Erro na requisição: Status " + res.status);
    const csv  = await res.text();
    const linhas = csv.replace(/\r/g,"").trim().split("\n").map(l=>l.split(","));
    linhas.shift();
    return linhas.map(c => {
      if(c.length < 5) return null;
      return { id:c[0], empresa:c[1], dept:c[2], nome:c[3], ramal:c[4], email:c[5]||"" };
    }).filter(r => r !== null);
  } catch(error) {
    document.getElementById("content").innerHTML = `
      <div class="empty">
        <div style="color:#c00000; font-weight:700;">
          ⚠ Falha ao carregar ramais.<br>
          <span style="font-weight:400; color:#404040; font-size:10px;">${error.message}</span>
        </div>
      </div>`;
    document.getElementById("statusLeft").textContent = "Erro ao carregar dados";
    throw error;
  }
}

/* ======================================================
                  FILTRO E RENDERIZAÇÃO
====================================================== */

let ramais = [];
let empFilter = "";

function setEmp(btn, emp){
  empFilter = emp;
  ["btnAll","btnT","btnV"].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.remove("active");
  });
  btn.classList.add("active");
  render();
}

function initials(n){
  if(!n) return "??";
  return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
}

function render(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const deptSel = document.getElementById("filterDept").value;

  const filtrados = ramais.filter(r =>
    (!empFilter || r.empresa===empFilter) &&
    (!deptSel || r.dept===deptSel) &&
    (!q || r.nome.toLowerCase().includes(q) || r.ramal.includes(q) || r.email.toLowerCase().includes(q))
  );

  document.getElementById("statsRow").innerHTML =
    `<strong>${filtrados.length}</strong> ramal(is) exibido(s) &nbsp;|&nbsp; ` +
    `<strong>${new Set(filtrados.map(r=>r.dept)).size}</strong> departamento(s)`;

  document.getElementById("statusLeft").textContent = `${filtrados.length} objeto(s)`;

  const lstDepts = [...new Set(ramais.filter(r=>!empFilter || r.empresa===empFilter).map(r=>r.dept))].sort();
  document.getElementById("filterDept").innerHTML =
    `<option value="">— Todos —</option>` +
    lstDepts.map(d=>`<option value="${d}" ${deptSel===d?'selected':''}>${d}</option>`).join("");

  if(!filtrados.length){
    document.getElementById("content").innerHTML =
      `<div class="empty">Nenhum resultado encontrado para os critérios selecionados.</div>`;
    return;
  }

  const grupos = {};
  filtrados.forEach(r=>{
    const chave = r.empresa+"|||"+r.dept;
    (grupos[chave] = grupos[chave] || []).push(r);
  });

  document.getElementById("content").innerHTML =
    Object.entries(grupos).map(([key,list])=>{
      const [emp, dept] = key.split("|||");
      const cor = getDeptColor(dept);
      const tag = emp==="TECFAG" ? "tag-t" : emp==="VALEM" ? "tag-v" : "tag-o";

      return `
        <div class="dept-block">
          <div class="dept-header">
            <span>📁 ${dept}</span>
            <span class="dept-tag ${tag}">${emp}</span>
            <span class="dept-count">${list.length} ramal(is)</span>
          </div>
          <div class="grid">
            ${list.map(r=>`
              <div class="card">
                <div class="card-top">
                  <div class="avatar" style="background:${cor}">${initials(r.nome)}</div>
                  <div style="overflow:hidden;">
                    <div class="card-name">${r.nome}</div>
                    ${r.email ? `<div class="card-email" title="${r.email}">${r.email}</div>` : ""}
                  </div>
                </div>
                <div class="ramal-area">
                  <span class="ramal-label">Ramal:</span>
                  <span class="ramal-display" style="color:${cor}">${r.ramal}</span>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }).join("");
}

/* Clock in status bar */
function updateClock(){
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  const el = document.getElementById("statusTime");
  if(el) el.textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

/* Boot */
document.getElementById("content").innerHTML = `
  <div class="empty">
    <div>Aguarde, carregando lista de ramais...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>`;

carregarRamais().then(d=>{
  if(d){ ramais=d; render(); }
}).catch(()=>{});
</script>
